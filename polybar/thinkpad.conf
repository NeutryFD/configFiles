; =============================================================================
; COLORS
; =============================================================================
[colors]
background     = #E61a1b26
background-alt = #232133
foreground     = #dfdfdf
bg1            = #232133
bg2            = #38354c
foreground-alt = #555
primary        = #dfdfdf
secondary      = #e60053
alert          = #bd2c40

; =============================================================================
; BASE BAR CONFIG
; =============================================================================
[bar/base]
override-redirect = true
wm-restack = bspwm
enable-ipc = true
monitor = ${env:MONITOR:}
radius = 6.0
height = 35
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3
line-color = #f00
border-size = 4
border-color = #00000000
padding-left = 2
padding-right = 2
module-margin-left = 1
module-margin-right = 2
dpi = 96
font-0 = fixed:pixelsize=12;1
font-1 = unifont:fontformat=truetype:pixelsize=12:antialias=true;1
font-2 = siji:pixelsize=12;1
font-3 = MaterialIcons-Regular:style=Bold:pixelsize=13;1
font-4 = HackNerdFont-Bold:style=Bold:pixelsize=12;1
tray-position = none
tray-padding = 2
cursor-click = pointer
cursor-scroll = ns-resize

; =============================================================================
; BAR DEFINITIONS ‚ÄĒ INTERNAL (LAPTOP SCREEN)
; =============================================================================
[bar/thinkpad-left]
inherit = bar/base
width = 12%
offset-x = 0.5%
modules-center = xkeyboard battery filesystem

[bar/thinkpad-banner]
inherit = bar/base
width = 18%
offset-x = 12.5%
modules-center = banner

[bar/thinkpad-vpn]
inherit = bar/base
width = 12%
offset-x = 70%
bottom = true
modules-center = vpn

[bar/thinkpad-bspwm]
inherit = bar/base
width = 8%
offset-x = 45%
modules-center = bspwm

[bar/thinkpad-music]
inherit = bar/base
width = 10%
offset-x = 61.5%
modules-center = spotify

[bar/thinkpad-wifi]
inherit = bar/base
width = 9%
offset-x = 82%
bottom = true
modules-center = wlan

[bar/thinkpad-ethernet]
inherit = bar/base
width = 9%
offset-x = 91%
bottom = true
modules-center = eth

[bar/thinkpad-right]
inherit = bar/base
width = 28%
offset-x = 71.5%
modules-center = spotify-prev spotify-play-pause spotify-next alsa memory cpu temperature date

[bar/thinkpad-tray]
inherit = bar/base
width = 20%
offset-x = 0.5%
bottom = true
modules-left = tray
tray-position = right

; =============================================================================
; BAR DEFINITIONS ‚ÄĒ EXTERNAL MONITORS
; =============================================================================
[bar/thinkpad-ext-banner]
inherit = bar/base
width = 16%
offset-x = 0.8%
modules-left = banner
height = 27
font-0 = fixed:pixelsize=10;1
font-1 = unifont:fontformat=truetype:pixelsize=10:antialias=true;1
font-2 = siji:pixelsize=10;1
font-3 = MaterialIcons-Regular:style=Bold:pixelsize=11;1
font-4 = HackNerdFont-Bold:style=Bold:pixelsize=10;1

[bar/thinkpad-ext-vpn]
inherit = bar/base
width = 10%
offset-x = 17%
modules-center = vpn
height = 27
font-0 = fixed:pixelsize=10;1
font-1 = unifont:fontformat=truetype:pixelsize=10:antialias=true;1
font-2 = siji:pixelsize=10;1
font-3 = MaterialIcons-Regular:style=Bold:pixelsize=11;1
font-4 = HackNerdFont-Bold:style=Bold:pixelsize=10;1

[bar/thinkpad-ext-bspwm]
inherit = bar/base
width = 7%
offset-x = 46.5%
modules-center = bspwm
height = 27
font-0 = fixed:pixelsize=10;1
font-1 = unifont:fontformat=truetype:pixelsize=10:antialias=true;1
font-2 = siji:pixelsize=10;1
font-3 = MaterialIcons-Regular:style=Bold:pixelsize=11;1
font-4 = HackNerdFont-Bold:style=Bold:pixelsize=10;1

[bar/thinkpad-ext-music]
inherit = bar/base
width = 10%
offset-x = 73%
modules-center = spotify
height = 27
font-0 = fixed:pixelsize=10;1
font-1 = unifont:fontformat=truetype:pixelsize=10:antialias=true;1
font-2 = siji:pixelsize=10;1
font-3 = MaterialIcons-Regular:style=Bold:pixelsize=11;1
font-4 = HackNerdFont-Bold:style=Bold:pixelsize=10;1

[bar/thinkpad-ext-right]
inherit = bar/base
width = 16%
offset-x = 83.3%
modules-right = spotify-prev spotify-play-pause spotify-next volume date
height = 27
font-0 = fixed:pixelsize=10;1
font-1 = unifont:fontformat=truetype:pixelsize=10:antialias=true;1
font-2 = siji:pixelsize=10;1
font-3 = MaterialIcons-Regular:style=Bold:pixelsize=11;1
font-4 = HackNerdFont-Bold:style=Bold:pixelsize=10;1

; =============================================================================
; MODULES - SYSTEM
; =============================================================================
[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
format-prefix-foreground = ${colors.foreground-alt}
label-layout = %layout%
label-indicator-padding = 5
label-indicator-margin = 1
label-indicator-background = ${colors.secondary}
label-indicator-underline = ${colors.secondary}

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
label-mounted = %mountpoint%: %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.foreground-alt}

[module/memory]
type = internal/memory
interval = 3
warn-percentage = 95
format = <label>
label = ÓŅÖ   %gb_used%

[module/cpu]
type = internal/cpu
format = <label>
format-prefix =" Ôčõ  :"
label = %percentage%%

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 60

[module/date]
type = internal/date
interval = 1
date = "%d-%m-%Y"
time = "%H:%M:%S"
format-padding = 1
format-prefix-foreground = #6381C4
format-foreground = #6381C4
label = %date% %time%

[module/volume]
type = custom/script
exec = $HOME/configFiles/polybar/scripts/volume.sh
interval = 0
format = <label>
label = %output%

[module/wlan]
type = internal/network
interface = wlp2s0
interval = 3.0
format-connected = <label-connected>
label-connected =    %local_ip%
label-disconnected = " ůįĖ™  "

[module/eth]
type = internal/network
interface = enp1s0
interval = 3.0
format-connected-prefix-foreground = ${colors.foreground-alt}
label-connected = ůįĆó : %local_ip%
format-disconnected = "No connected"

[module/battery]
type = internal/battery
full-at = 99
low-at = 5
battery = BAT0
adapter = ADP1
poll-interval = 5
time-format = %H:%M
format-charging = <animation-charging>    <label-charging>
format-discharging = <ramp-capacity>   <label-discharging>
label-charging = Charging %percentage%%
label-discharging = Discharging %percentage%%
label-full = Fully charged
label-low = BATTERY LOW
ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-framerate = 750
animation-discharging-0 = 
animation-discharging-1 = 
animation-discharging-2 = 
animation-discharging-3 = 
animation-discharging-4 = 
animation-discharging-framerate = 500
animation-low-0 = !
animation-low-1 =
animation-low-framerate = 200

; =============================================================================
; MODULES - BSPWM
; =============================================================================
[module/bspwm]
type = internal/bspwm
format-padding = 2
label-focused = " ůįģĮ "
label-focused-background = ${colors.background}
label-focused-underline = ${colors.primary}
label-focused-padding = 1
label-focused-foreground = #FFD700
label-occupied = " ůįä† "
label-occupied-foreground = #96CDFB
label-occupied-padding = 1
label-urgent = %index%!
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = " ůįßĶ "
label-empty-foreground = #FFC0CB
label-empty-padding = 1

; =============================================================================
; MODULES - SPOTIFY
; =============================================================================
[module/spotify]
type = custom/script
tail = true
interval = 0
format-prefix = " "
format = <label>
exec = $HOME/configFiles/polybar/scripts/spotify_status.sh
label-padding = 1
label-maxlen = 20
label-ellipsis = false

[module/spotify-prev]
type = custom/script
exec = echo "ůįô£ "
format = <label>
click-left = playerctl previous -p spotify

[module/spotify-play-pause]
type = custom/ipc
hook-1 = echo "ůįŹ§ "
hook-0 = echo "ůįźĆ "
initial = 0
click-left = playerctl play-pause -p spotify

[module/spotify-next]
type = custom/script
exec = echo "ůįô° "
format = <label>
click-left = playerctl next -p spotify

; =============================================================================
; MODULES - CUSTOM
; =============================================================================
[module/banner]
type = custom/script
exec = $HOME/configFiles/polybar/scripts/banner.sh
interval = 0
tail = true
format = <label>
label-padding = 1
label-maxlen = 43
label-ellipsis = false

[module/vpn]
type = custom/script
interval = 3
exec = $HOME/configFiles/polybar/scripts/vpn-nmcli.sh
format = <label>
label = VPN: %output%

[module/tray]
type = internal/tray
format-margin = 2px
tray-spacing = 2px

; =============================================================================
; SETTINGS
; =============================================================================
[settings]
screenchange-reload = true

[global/wm]
margin-top = 5
margin-bottom = 5

