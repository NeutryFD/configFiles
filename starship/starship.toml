"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = '''
[┌───────────────────>](bold green) 
[│](bold green)  $username$hostname$sudo$time$battery $status 
[│](bold green)  $directory$git_branch$git_status$git_metrics
[└─](bold green) $shell $python$character'''


[battery]
full_symbol = '󰁹 '
charging_symbol = '󰂄 '
discharging_symbol = '󰂃 '
disabled = false



[git_status]
conflicted = ' '
ahead = ' 󰜸 '
behind = ' 󰜯 '
diverged = ' 󰃻 '
up_to_date = ' 󰄬 '
untracked = ' 󰋗  '
stashed = ' 󰏗 '
modified = ' 󰏫 '
staged = '[󰐕 \($count\)](green)'
renamed = ' 󰑕 '
deleted = ' 󰍶 '


[git_metrics]
added_style = 'bold blue'
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '

[git_branch]
symbol = ' '
truncation_length = 4
truncation_symbol = ''
ignore_branches = ['master', 'main']

[[battery.display]]
threshold = 40
style = 'bold red'

[python]
symbol = " "
style = "green"
format = '[(${virtualenv})${symbol}]($style)'
disabled = false

# Only show when venv is active
detect_extensions = []
detect_files = []
detect_folders = []
detect_env_vars = ["VIRTUAL_ENV"]

[status]
symbol = " "
style = 'fg:blue'
success_symbol = " "
format = '$symbol$common_meaning$signal_name$maybe_int($style) '
map_symbol = true
disabled = false

[sudo]
format = '\[[as $symbol]($style)\]'
disabled = false

[time]
style = 'bold #ff006e'
format = '\[[$time]($style)\]'
disabled = false

[username]
format = '\[[$user]($style)\]'
show_always = true
disabled = false

[hostname]
format = '\[[$ssh_symbol($hostname)]($style)\] '
disabled = false
ssh_only = false

[shell]
format = '$indicator($style)'
disabled = false
